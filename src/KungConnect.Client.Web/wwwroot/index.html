<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KungConnect</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="KungConnect.Client.Web.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="js/screen-capture.js"></script>
    <script>
        // Fire a custom URI scheme without navigating away.
        window.kcLaunchUri = function (uri) {
            var a = document.createElement('a');
            a.href = uri;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            setTimeout(function () { document.body.removeChild(a); }, 200);
        };

        // Try to launch a kungconnect:// URI.
        // Returns a Promise<bool> — true if the OS handled it (browser lost focus),
        // false if the client is probably not installed.
        // Skips the detection when localStorage flag says client is known-installed.
        window.kcTryLaunch = function (uri) {
            return new Promise(function (resolve) {
                if (localStorage.getItem('kc_client_installed') === '1') {
                    window.kcLaunchUri(uri);
                    resolve(true);
                    return;
                }
                var opened = false;
                var onBlur = function () { opened = true; };
                window.addEventListener('blur', onBlur, { once: true });
                document.addEventListener('visibilitychange', function onVis() {
                    if (document.hidden) { opened = true; document.removeEventListener('visibilitychange', onVis); }
                }, { once: true });
                window.kcLaunchUri(uri);
                setTimeout(function () {
                    window.removeEventListener('blur', onBlur);
                    if (opened) { localStorage.setItem('kc_client_installed', '1'); }
                    resolve(opened);
                }, 2500);
            });
        };

        // Called after user confirms they installed the client — mark as installed and launch.
        window.kcMarkInstalledAndLaunch = function (uri) {
            localStorage.setItem('kc_client_installed', '1');
            window.kcLaunchUri(uri);
        };

        // Returns 'windows', 'macos', or 'linux' based on the browser UA
        window.kcDetectOs = function () {
            var ua = navigator.userAgent;
            if (/Win/i.test(ua)) return 'windows';
            if (/Mac/i.test(ua)) return 'macos';
            return 'linux';
        };

        // Programmatically trigger a file download
        window.kcTriggerDownload = function (url) {
            var a = document.createElement('a');
            a.href = url;
            a.download = '';
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            setTimeout(function () { document.body.removeChild(a); }, 200);
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
