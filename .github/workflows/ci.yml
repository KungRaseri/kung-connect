name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Build & test the full solution ──────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore KungConnect.sln --locked-mode || dotnet restore KungConnect.sln

      - name: Build
        run: dotnet build KungConnect.sln --no-restore -c Release

      - name: Test
        run: |
          dotnet test KungConnect.sln --no-build -c Release \
            --logger "console;verbosity=normal" \
            --results-directory test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/**

  # ── Validate the client compiles for all target platforms ───────────────────
  # (Framework-dependent, no runtime packs downloaded — just a compile check)
  client-compile-check:
    name: Client compile check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for rev-list --count

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Compute version
        id: ver
        run: |
          COUNT=$(git rev-list --count HEAD)
          HASH=$(git rev-parse --short HEAD)
          echo "semver=0.0.${COUNT}-${HASH}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/KungConnect.Client/KungConnect.Client.csproj

      - name: Build (framework-dependent — validates cross-platform compile)
        run: |
          dotnet build src/KungConnect.Client/KungConnect.Client.csproj \
            --no-restore -c Release \
            -p:Version=${{ steps.ver.outputs.semver }}

  # ── Validate the Docker image builds correctly ──────────────────────────────
  docker-validate:
    name: Validate Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build server image (no push)
        run: docker build -f deploy/Dockerfile.server -t kung-connect-server:ci .

  # ── Auto-tag on successful main push ────────────────────────────────────────
  # Runs only when all other jobs pass AND the event is a push to main.
  # IMPORTANT: uses PAT_TOKEN (not GITHUB_TOKEN) to push the tag so that
  # GitHub triggers the Release workflow — pushes made with GITHUB_TOKEN
  # are intentionally blocked from triggering downstream workflows.
  # Create a fine-grained PAT with 'Contents: Read and write' and store
  # it as a repository secret named PAT_TOKEN.
  auto-tag:
    name: Auto-tag for release
    needs: [build-and-test, client-compile-check, docker-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for rev-list --count
          token: ${{ secrets.PAT_TOKEN }}

      - name: Compute tag name
        id: tag
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "name=v0.0.${COUNT}" >> $GITHUB_OUTPUT
          echo "Tag will be: v0.0.${COUNT}"

      - name: Check tag doesn't already exist
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.tag.outputs.name }}" \
              | grep -q "${{ steps.tag.outputs.name }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.tag.outputs.name }} already exists — skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.name }}" \
            -m "Auto-release ${{ steps.tag.outputs.name }}"
          git push origin "${{ steps.tag.outputs.name }}"
          echo "Pushed ${{ steps.tag.outputs.name }}"
