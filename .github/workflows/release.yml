name: Release

on:
  push:
    tags:
      - 'v*'

# Write release assets + push to GHCR
permissions:
  contents: write
  packages: write

jobs:
  # ── Build the desktop client for every supported platform ───────────────────
  build-client:
    name: Client — ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            bin: KungConnect.exe
            pkg: zip
            label: Windows (x64)

          - rid: linux-x64
            bin: KungConnect
            pkg: tar
            label: Linux (x64)

          - rid: osx-x64
            bin: KungConnect
            pkg: zip
            label: macOS (Intel x64)

          - rid: osx-arm64
            bin: KungConnect
            pkg: zip
            label: macOS (Apple Silicon)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish — ${{ matrix.label }}
        run: |
          dotnet publish src/KungConnect.Client/KungConnect.Client.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:AssemblyName=KungConnect \
            -o dist/${{ matrix.rid }}

      - name: Package (zip)
        if: matrix.pkg == 'zip'
        run: |
          zip -j \
            "KungConnect-${{ github.ref_name }}-${{ matrix.rid }}.zip" \
            "dist/${{ matrix.rid }}/${{ matrix.bin }}"

      - name: Package (tar.gz)
        if: matrix.pkg == 'tar'
        run: |
          tar -czf \
            "KungConnect-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz" \
            -C "dist/${{ matrix.rid }}" "${{ matrix.bin }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.rid }}
          path: "KungConnect-${{ github.ref_name }}-${{ matrix.rid }}.*"
          if-no-files-found: error

  # ── Build & push the server Docker image to GHCR ───────────────────────────
  docker:
    name: Docker — build & push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kung-connect-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release with all artifacts ────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-client, docker]
    runs-on: ubuntu-latest

    steps:
      - name: Download all client artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/**
          body: |
            ## Docker image

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/kung-connect-server:${{ github.ref_name }}
            ```

            ## Setting download URLs

            After deploying the server, add these to your `.env` so the join page
            offers the correct download link for each platform:

            ```env
            DOWNLOADS_WINDOWS_URL=https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/KungConnect-${{ github.ref_name }}-win-x64.zip
            DOWNLOADS_MACOS_URL=https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/KungConnect-${{ github.ref_name }}-osx-arm64.zip
            DOWNLOADS_LINUX_URL=https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/KungConnect-${{ github.ref_name }}-linux-x64.tar.gz
            ```

            > **Intel Mac users:** use `KungConnect-${{ github.ref_name }}-osx-x64.zip` instead of the arm64 build.
