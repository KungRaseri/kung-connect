name: Release

# Triggers when a v* tag is pushed — in practice this only happens via the
# auto-tag job in ci.yml, which requires every CI check to pass first.
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  # ── Compute version string from commit history ──────────────────────────────
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.ver.outputs.semver }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for rev-list --count

      - name: Compute version
        id: ver
        run: |
          COUNT=$(git rev-list --count HEAD)
          HASH=$(git rev-parse --short HEAD)
          echo "semver=0.0.${COUNT}-${HASH}" >> $GITHUB_OUTPUT
          echo "Computed version: 0.0.${COUNT}-${HASH}"

  # ── Build the desktop client for every supported platform ───────────────────
  build-client:
    name: Client — ${{ matrix.label }}
    needs: [version]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            bin: KungConnect.exe
            pkg: zip
            label: Windows (x64)

          - rid: linux-x64
            bin: KungConnect
            pkg: tar
            label: Linux (x64)

          - rid: osx-x64
            bin: KungConnect
            pkg: zip
            label: macOS (Intel x64)

          - rid: osx-arm64
            bin: KungConnect
            pkg: zip
            label: macOS (Apple Silicon)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish — ${{ matrix.label }}
        run: |
          dotnet publish src/KungConnect.Client/KungConnect.Client.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:Version=${{ needs.version.outputs.semver }} \
            -o dist/${{ matrix.rid }}

      - name: Package (zip)
        if: matrix.pkg == 'zip'
        run: |
          zip -j \
            "KungConnect-${{ matrix.rid }}.zip" \
            "dist/${{ matrix.rid }}/${{ matrix.bin }}"

      - name: Package (tar.gz)
        if: matrix.pkg == 'tar'
        run: |
          tar -czf \
            "KungConnect-${{ matrix.rid }}.tar.gz" \
            -C "dist/${{ matrix.rid }}" "${{ matrix.bin }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.rid }}
          path: "KungConnect-${{ matrix.rid }}.*"
          if-no-files-found: error

  # ── Build the agent for every supported platform ──────────────────────────
  build-agent:
    name: Agent — ${{ matrix.label }}
    needs: [version]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            bin: KungConnect.Agent.exe
            pkg: zip
            label: Windows (x64)

          - rid: linux-x64
            bin: KungConnect.Agent
            pkg: tar
            label: Linux (x64)

          - rid: linux-arm64
            bin: KungConnect.Agent
            pkg: tar
            label: Linux (ARM64)

          - rid: osx-arm64
            bin: KungConnect.Agent
            pkg: zip
            label: macOS (Apple Silicon)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish — ${{ matrix.label }}
        run: |
          dotnet publish src/KungConnect.Agent/KungConnect.Agent.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:Version=${{ needs.version.outputs.semver }} \
            -o dist/agent-${{ matrix.rid }}

      - name: Package (zip)
        if: matrix.pkg == 'zip'
        run: |
          zip -j \
            "KungConnect-Agent-${{ matrix.rid }}.zip" \
            "dist/agent-${{ matrix.rid }}/${{ matrix.bin }}"

      - name: Package (tar.gz)
        if: matrix.pkg == 'tar'
        run: |
          tar -czf \
            "KungConnect-Agent-${{ matrix.rid }}.tar.gz" \
            -C "dist/agent-${{ matrix.rid }}" "${{ matrix.bin }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.rid }}
          path: "KungConnect-Agent-${{ matrix.rid }}.*"
          if-no-files-found: error

  # ── Build & push the server Docker image to GHCR ───────────────────────────
  docker:
    name: Docker — build & push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kung-connect-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release with all artifacts ────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-client, build-agent, docker]
    runs-on: ubuntu-latest

    steps:
      - name: Download all client artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: client-*
          merge-multiple: true
          path: artifacts

      - name: Download all agent artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          merge-multiple: true
          path: artifacts

      - name: List artifacts (debug)
        run: ls -lR artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/KungConnect-*.zip
            artifacts/KungConnect-*.tar.gz
            artifacts/KungConnect-Agent-*.zip
            artifacts/KungConnect-Agent-*.tar.gz
          body: |
            ## Docker image

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/kung-connect-server:${{ github.ref_name }}
            ```

            ## Setting download URLs

            These are already set in `.env.example`. Copy them into your `.env` once
            and they will always point to the latest release — no updates needed.

            ```env
            # Desktop client (customer/join-page downloads)
            DOWNLOADS_WINDOWS_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-win-x64.zip
            DOWNLOADS_MACOS_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-osx-arm64.zip
            DOWNLOADS_LINUX_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-linux-x64.tar.gz

            # Agent (install on machines you want to manage)
            DOWNLOADS_AGENT_WINDOWS_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-Agent-win-x64.zip
            DOWNLOADS_AGENT_MACOS_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-Agent-osx-arm64.zip
            DOWNLOADS_AGENT_LINUX_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-Agent-linux-x64.tar.gz
            DOWNLOADS_AGENT_LINUX_ARM64_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-Agent-linux-arm64.tar.gz
            ```

            > **Intel Mac users:** use `KungConnect-osx-x64.zip` / `KungConnect-Agent-osx-x64.zip` instead of the arm64 builds.
