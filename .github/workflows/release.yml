name: Release

# Triggers automatically when a v* tag is pushed (via the auto-tag job in ci.yml).
# Can also be run manually from the Actions tab to create an immediate release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version string (e.g. 0.0.42-manual). Leave blank to auto-compute from commit count.'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

jobs:
  # ── Compute version string from commit history ──────────────────────────────
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.ver.outputs.semver }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for rev-list --count

      - name: Compute version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            SEMVER="${{ github.event.inputs.version_override }}"
          else
            COUNT=$(git rev-list --count HEAD)
            HASH=$(git rev-parse --short HEAD)
            SEMVER="0.0.${COUNT}-${HASH}"
          fi
          echo "semver=${SEMVER}" >> $GITHUB_OUTPUT
          echo "Computed version: ${SEMVER}"

  # ── Build the desktop client for every supported platform ───────────────────
  build-client:
    name: Client — ${{ matrix.label }}
    needs: [version]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            bin: KungConnect.exe
            pkg: zip
            label: Windows (x64)

          - rid: linux-x64
            bin: KungConnect
            pkg: tar
            label: Linux (x64)

          - rid: osx-x64
            bin: KungConnect
            pkg: zip
            label: macOS (Intel x64)

          - rid: osx-arm64
            bin: KungConnect
            pkg: zip
            label: macOS (Apple Silicon)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish — ${{ matrix.label }}
        run: |
          dotnet publish src/KungConnect.Client/KungConnect.Client.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:Version=${{ needs.version.outputs.semver }} \
            -o dist/${{ matrix.rid }}

      - name: Package (zip)
        if: matrix.pkg == 'zip'
        run: |
          zip -j \
            "KungConnect-${{ matrix.rid }}.zip" \
            "dist/${{ matrix.rid }}/${{ matrix.bin }}"

      - name: Package (tar.gz)
        if: matrix.pkg == 'tar'
        run: |
          tar -czf \
            "KungConnect-${{ matrix.rid }}.tar.gz" \
            -C "dist/${{ matrix.rid }}" "${{ matrix.bin }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.rid }}
          path: "KungConnect-${{ matrix.rid }}.*"
          if-no-files-found: error

  # ── Build the agent for every supported platform ──────────────────────────
  build-agent:
    name: Agent — ${{ matrix.label }}
    needs: [version]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: WiX MSI — MUST run on windows-latest; WiX does not support Linux
          - rid: win-x64
            label: Windows (x64)
            tfm: net9.0-windows
            runner: windows-latest
            installer: msi

          # Linux x64: Debian .deb + tar.gz fallback
          - rid: linux-x64
            label: Linux (x64)
            tfm: net9.0
            runner: ubuntu-latest
            installer: deb
            deb_arch: amd64

          # Linux ARM64: Debian .deb + tar.gz fallback
          - rid: linux-arm64
            label: Linux (ARM64)
            tfm: net9.0
            runner: ubuntu-latest
            installer: deb
            deb_arch: arm64

          # macOS Apple Silicon: .pkg installer (must run on macOS for pkgbuild)
          - rid: osx-arm64
            label: macOS (Apple Silicon)
            tfm: net9.0
            runner: macos-latest
            installer: pkg

          # macOS Intel: .pkg installer
          - rid: osx-x64
            label: macOS (Intel x64)
            tfm: net9.0
            runner: macos-latest
            installer: pkg

    defaults:
      run:
        shell: bash   # backslash line-continuations work on all runners (Linux/macOS/Windows+Git)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish — ${{ matrix.label }}
        run: |
          dotnet publish src/KungConnect.Agent/KungConnect.Agent.csproj \
            -c Release \
            -f ${{ matrix.tfm }} \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:Version=${{ needs.version.outputs.semver }} \
            -o dist/agent-${{ matrix.rid }}

      # ── Windows: WiX MSI ──────────────────────────────────────────────────
      - name: Install WiX
        if: matrix.installer == 'msi'
        run: |
          # Pin to v4.x — v5+ are not yet stable; v6 breaks extension resolution.
          dotnet tool install --global wix --version "4.0.5"
          wix extension add --global WixToolset.UI.wixext/4.0.5
          wix extension add --global WixToolset.Util.wixext/4.0.5

      - name: Harvest agent files
        if: matrix.installer == 'msi'
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File installer/windows/harvest-agent.ps1 `
            -SourceDir dist/agent-win-x64 `
            -OutputFile installer/windows/AgentFiles.wxs

      - name: Build MSI
        if: matrix.installer == 'msi'
        run: |
          wix build \
            installer/windows/Product.wxs \
            installer/windows/ServerUrlDlg.wxs \
            installer/windows/AgentFiles.wxs \
            -d Version=${{ needs.version.outputs.semver }} \
            -d AgentBinDir=dist/agent-win-x64 \
            -arch x64 \
            -ext WixToolset.UI.wixext \
            -ext WixToolset.Util.wixext \
            -o KungConnect-Agent-win-x64.msi

      # ── Linux: Debian .deb + tar.gz fallback ──────────────────────────────
      - name: Build .deb
        if: matrix.installer == 'deb'
        run: |
          chmod +x installer/linux/build-deb.sh
          installer/linux/build-deb.sh \
            dist/agent-${{ matrix.rid }} \
            ${{ needs.version.outputs.semver }} \
            KungConnect-Agent-${{ matrix.rid }}.deb \
            ${{ matrix.deb_arch }}
          # Also ship a tar.gz for users who prefer manual installs.
          tar -czf KungConnect-Agent-${{ matrix.rid }}.tar.gz \
            -C dist/agent-${{ matrix.rid }} KungConnect.Agent

      # ── macOS: .pkg installer ─────────────────────────────────────────────
      - name: Build .pkg
        if: matrix.installer == 'pkg'
        run: |
          chmod +x installer/macos/build-pkg.sh
          installer/macos/build-pkg.sh \
            dist/agent-${{ matrix.rid }} \
            ${{ needs.version.outputs.semver }} \
            KungConnect-Agent-${{ matrix.rid }}.pkg \
            ${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.rid }}
          path: "KungConnect-Agent-${{ matrix.rid }}.*"
          if-no-files-found: error

  # ── Build & push the server Docker image to GHCR ───────────────────────────
  docker:
    name: Docker — build & push
    needs: [version]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kung-connect-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ needs.version.outputs.semver }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release with all artifacts ────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-client, build-agent, docker, version]
    # build-agent now fans out to 5 matrix entries across ubuntu + macos runners;
    # all must succeed before a release is cut.
    runs-on: ubuntu-latest

    steps:
      - name: Download all client artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: client-*
          merge-multiple: true
          path: artifacts

      - name: Download all agent artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          merge-multiple: true
          path: artifacts

      - name: List artifacts (debug)
        run: ls -lR artifacts/

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=v${{ needs.version.outputs.semver }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: ${{ github.event_name != 'workflow_dispatch' }}
          fail_on_unmatched_files: true
          files: artifacts/*
          body: |
            ## Docker image

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/kung-connect-server:${{ steps.tag.outputs.name }}
            ```

            ## Setting download URLs

            These are already set in `.env.example`. Copy them into your `.env` once
            and they will always point to the latest release — no updates needed.

            ```env
            # Desktop client (customer/join-page downloads)
            DOWNLOADS_WINDOWS_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-win-x64.zip
            DOWNLOADS_MACOS_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-osx-arm64.zip
            DOWNLOADS_LINUX_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-linux-x64.tar.gz

            # Agent (install on machines you want to manage)
            DOWNLOADS_AGENT_WINDOWS_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-Agent-win-x64.msi
            DOWNLOADS_AGENT_MACOS_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-Agent-osx-arm64.pkg
            DOWNLOADS_AGENT_LINUX_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-Agent-linux-x64.deb
            DOWNLOADS_AGENT_LINUX_ARM64_URL=https://github.com/${{ github.repository }}/releases/latest/download/KungConnect-Agent-linux-arm64.deb
            ```

            > **Intel Mac users:** use `KungConnect-osx-x64.zip` (client) / `KungConnect-Agent-osx-x64.pkg` (agent) instead of the arm64 builds.
            > **.deb users:** A `*.tar.gz` portable binary is also included in each release for distros without dpkg.
