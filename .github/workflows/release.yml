name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# Only proceed when the CI run that just finished:
#   1. succeeded
#   2. was triggered by a v* tag
# Every job below repeats this condition so the run is skipped cleanly
# rather than failing if e.g. a branch push completed CI.

# Write release assets + push to GHCR
permissions:
  contents: write
  packages: write

jobs:
  # ── Compute version string from commit history ──────────────────────────────
  version:
    name: Compute version
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.ver.outputs.semver }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0   # needed for rev-list --count

      - name: Compute version
        id: ver
        run: |
          COUNT=$(git rev-list --count HEAD)
          HASH=$(git rev-parse --short HEAD)
          # Format: 0.0.<commit-count>-<short-hash>  e.g. 0.0.142-a1b2c3d
          # .NET automatically derives AssemblyVersion/FileVersion as 0.0.<count>.0
          # and InformationalVersion as the full semver string.
          echo "semver=0.0.${COUNT}-${HASH}" >> $GITHUB_OUTPUT
          echo "Computed version: 0.0.${COUNT}-${HASH}"

  # ── Build the desktop client for every supported platform ───────────────────
  build-client:
    name: Client — ${{ matrix.rid }}
    needs: [version]
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            bin: KungConnect.exe
            pkg: zip
            label: Windows (x64)

          - rid: linux-x64
            bin: KungConnect
            pkg: tar
            label: Linux (x64)

          - rid: osx-x64
            bin: KungConnect
            pkg: zip
            label: macOS (Intel x64)

          - rid: osx-arm64
            bin: KungConnect
            pkg: zip
            label: macOS (Apple Silicon)

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish — ${{ matrix.label }}
        run: |
          dotnet publish src/KungConnect.Client/KungConnect.Client.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:AssemblyName=KungConnect \
            -p:Version=${{ needs.version.outputs.semver }} \
            -o dist/${{ matrix.rid }}

      - name: Package (zip)
        if: matrix.pkg == 'zip'
        run: |
          zip -j \
            "KungConnect-${{ github.event.workflow_run.head_branch }}-${{ matrix.rid }}.zip" \
            "dist/${{ matrix.rid }}/${{ matrix.bin }}"

      - name: Package (tar.gz)
        if: matrix.pkg == 'tar'
        run: |
          tar -czf \
            "KungConnect-${{ github.event.workflow_run.head_branch }}-${{ matrix.rid }}.tar.gz" \
            -C "dist/${{ matrix.rid }}" "${{ matrix.bin }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.rid }}
          path: "KungConnect-${{ github.event.workflow_run.head_branch }}-${{ matrix.rid }}.*"
          if-no-files-found: error

  # ── Build & push the server Docker image to GHCR ───────────────────────────
  docker:
    name: Docker — build & push
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kung-connect-server
          tags: |
            type=raw,value=${{ github.event.workflow_run.head_branch }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release with all artifacts ────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-client, docker]
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all client artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/**
          body: |
            ## Docker image

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/kung-connect-server:${{ github.event.workflow_run.head_branch }}
            ```

            ## Setting download URLs

            After deploying the server, add these to your `.env` so the join page
            offers the correct download link for each platform:

            ```env
            DOWNLOADS_WINDOWS_URL=https://github.com/${{ github.repository }}/releases/download/${{ github.event.workflow_run.head_branch }}/KungConnect-${{ github.event.workflow_run.head_branch }}-win-x64.zip
            DOWNLOADS_MACOS_URL=https://github.com/${{ github.repository }}/releases/download/${{ github.event.workflow_run.head_branch }}/KungConnect-${{ github.event.workflow_run.head_branch }}-osx-arm64.zip
            DOWNLOADS_LINUX_URL=https://github.com/${{ github.repository }}/releases/download/${{ github.event.workflow_run.head_branch }}/KungConnect-${{ github.event.workflow_run.head_branch }}-linux-x64.tar.gz
            ```

            > **Intel Mac users:** use `KungConnect-${{ github.event.workflow_run.head_branch }}-osx-x64.zip` instead of the arm64 build.
